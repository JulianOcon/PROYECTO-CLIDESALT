<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clidesalt | antenimiento Preventivo</title>
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/trabajos/logoc.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      .gradient-text {
        background: linear-gradient(135deg, #1e40af 0%, #06b6d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.25;
        display: inline-block;
      }
    </style>
  </head>

  <body class="bg-gradient-to-br from-gray-50 to-blue-50 text-gray-800">
    <!---------------- HEADER ------------->
    <div id="header-placeholder"></div>
    <script src="../js/header-service.js"></script>
    <!----------- CONTENIDO -------------->
    <section class="py-20 bg-white">
      <div class="max-w-6xl mx-auto px-6">
        <!-- TÍTULO -->
        <div class="text-center mb-14">
          <div
            class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl shadow-xl mb-6"
          >
            <img src="../assets/iconos/mantenimiento.svg" 
              alt="Mantenimiento Preventivo"
              class="w-10 h-10 object-contain"
              style="filter: brightness(0) invert(1);"/>
          </div>

          <h2 class="text-4xl md:text-5xl font-extrabold gradient-text mb-4">
            Mantenimiento Preventivo
          </h2>

          <p class="max-w-2xl mx-auto text-lg text-gray-600">
            Limpieza completa y revisión exhaustiva para prevenir fallas y
            alargar la vida útil.
          </p>
        </div>

        <!---------- SLIDER --------->
        <div
          class="bg-gradient-to-br from-blue-50 to-cyan-50 p-6 md:p-10 rounded-3xl shadow-xl border border-blue-100 mb-16"
        >
          <div
            class="slider relative bg-gray-900 rounded-2xl overflow-hidden shadow-2xl"
            data-images='[
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-1.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-2.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-3.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-4.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-5.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-6.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-7.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-8.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-9.jpeg",
            "../assets/trabajos/mantenimiento/trabajo-mantenimiento-10.jpeg"
          ]'
          >
            <div
              class="h-[280px] md:h-[500px] flex items-center justify-center"
            >
              <img
                class="slider-img w-full h-full object-contain transition-opacity duration-500"
              />
            </div>

            <button
              class="prev absolute left-4 top-1/2 -translate-y-1/2 bg-blue-600/80 hover:bg-blue-700 text-white px-4 py-3 rounded-full shadow-lg transition-all hover:scale-110"
            >
              ❮
            </button>

            <button
              class="next absolute right-4 top-1/2 -translate-y-1/2 bg-blue-600/80 hover:bg-blue-700 text-white px-4 py-3 rounded-full shadow-lg transition-all hover:scale-110"
            >
              ❯
            </button>

            <div
              class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/60 text-white px-4 py-2 rounded-full text-sm"
            >
              <span class="slider-counter">1 / 10</span>
            </div>
          </div>
        </div>

        <!--------- BENEFICIOS ------------->
        <div class="grid md:grid-cols-3 gap-6 mb-16">
          <div
            class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100 text-center"
          >
            <div class="text-3xl mb-3">⚡</div>
            <h3 class="font-bold text-lg mb-2 text-blue-700">
              Servicio Rápido
            </h3>
            <p class="text-gray-600 text-sm">
              Diagnóstico y reemplazo en corto tiempo
            </p>
          </div>

          <div
            class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100 text-center"
          >
            <div class="text-3xl mb-3">✅</div>
            <h3 class="font-bold text-lg mb-2 text-blue-700">Garantía</h3>
            <p class="text-gray-600 text-sm">
              Respaldo en todos nuestros trabajos
            </p>
          </div>

          <div
            class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100 text-center"
          >
            <div class="text-3xl mb-3">🛠️</div>
            <h3 class="font-bold text-lg mb-2 text-blue-700">Experiencia</h3>
            <p class="text-gray-600 text-sm">
              Técnicos especializados
            </p>
          </div>
        </div>

        <!-- CTA -->
        <div class="text-center">
          <a
            href="../index.html#contacto"
            class="inline-block bg-gradient-to-r from-blue-600 to-cyan-500 text-white px-10 py-4 rounded-full font-bold text-lg hover:shadow-2xl transition-all duration-300 hover:scale-105"
          >
            Solicitar Servicio
          </a>
        </div>
      </div>
    </section>

    <!--------- FOOTER ----------->
    <div id="footer-placeholder"></div>
    <script src="../js/footer.js"></script> 

    <script src="../js/slider.js"></script>

    <script src="../js/whatsapp-button.js"></script>
  </body>
</html>
