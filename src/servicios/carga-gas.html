<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clidesalt | Carga de Gas</title>
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/trabajos/logoc.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      .gradient-text {
        background: linear-gradient(135deg, #1e40af 0%, #06b6d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        display: inline-block;
        position: relative;
        line-height: 1.15;
        overflow: visible;
      }

      .gradient-text::after {
        content: "";
        display: block;
        height: 0.25em;
      }
    </style>
  </head>

  <body class="bg-gradient-to-br from-gray-50 to-blue-50 text-gray-800">
    <!-- ================= HEADER ================= -->
    <div id="header-placeholder"></div>
    <script src="../js/header-service.js"></script>

    <!-- ================= CONTENIDO ================= -->
    <section class="py-16 bg-white">
      <div class="max-w-6xl mx-auto px-6">
        <!-- ===== TÍTULO ===== -->
        <div class="text-center mb-12">
          <div
            class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl shadow-xl mb-6"
          >
            <img 
              src="../assets/iconos/gas.svg" 
              alt="Carga de Gas"
              class="w-10 h-10 object-contain"
              style="filter: brightness(0) invert(1);"/>
          </div>

          <h2 class="text-4xl md:text-5xl font-bold gradient-text mb-4 leading-[1.25]">
            Carga de Gas
          </h2>

          <p class="max-w-2xl mx-auto text-lg text-neutral-600">
            Carga y verificación precisa de gas refrigerante para máximo
            rendimiento y eficiencia
          </p>
        </div>

        <!-- ===== SLIDER ===== -->
        <div
          class="bg-gradient-to-br from-blue-50 to-cyan-50 p-8 rounded-3xl shadow-xl border border-blue-100 mb-12"
        >
          <div
            class="slider relative bg-neutral-900 rounded-xl overflow-hidden shadow-2xl"
            data-images='[
              "../assets/trabajos/carga-gas/trabajo-carga-gas-2.jpeg",
              "../assets/trabajos/carga-gas/trabajo-carga-gas-3.jpeg"
            ]'
          >
            <div
              class="h-[300px] md:h-[500px] flex items-center justify-center"
            >
              <img
                class="slider-img w-full h-full object-contain transition-opacity duration-500"
              />
            </div>

            <button
              class="prev absolute left-4 top-1/2 -translate-y-1/2 bg-blue-600/80 hover:bg-blue-700 text-white px-4 py-3 rounded-full shadow-lg transition-all hover:scale-110"
            >
              ❮
            </button>

            <button
              class="next absolute right-4 top-1/2 -translate-y-1/2 bg-blue-600/80 hover:bg-blue-700 text-white px-4 py-3 rounded-full shadow-lg transition-all hover:scale-110"
            >
              ❯
            </button>

            <div
              class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/60 text-white px-4 py-2 rounded-full text-sm"
            >
              <span class="slider-counter">1 / 3</span>
            </div>
          </div>
        </div>

        <!-- ===== BENEFICIOS ===== -->
        <div id="service-info-placeholder"></div>
      <script src="../js/service-info.js"></script>
    </section>

    <!-- ================= FOOTER ================= -->
    <div id="footer-placeholder"></div>
    <script src="../js/footer.js"></script> 

    <script src="../js/slider.js"></script>

    <script src="../js/whatsapp-button.js"></script>
  </body>
</html>
